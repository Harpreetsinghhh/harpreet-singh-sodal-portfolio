kind = "web"
previewPath = "/"
title = "Mina Massoud Portfolio"
version = "1.0.0"
id = "artifacts/mina-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21864

[services.development]
run = "pnpm --filter @workspace/mina-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mina-portfolio", "run", "build" ]
publicDir = "artifacts/mina-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21864"
BASE_PATH = "/"
