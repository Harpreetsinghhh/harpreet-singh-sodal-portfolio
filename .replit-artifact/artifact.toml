kind = "web"
previewPath = "/"
title = "Harpreet Singh Portfolio"
version = "1.0.0"
id = "artifacts/harpreet-singh"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21864

[services.development]
run = "pnpm --filter @workspace/harpreet-singh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/harpreet-singh", "run", "build" ]
publicDir = "artifacts/harpreet-singh/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21864"
BASE_PATH = "/"
